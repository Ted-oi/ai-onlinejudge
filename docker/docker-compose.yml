version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: onlinejudge-postgres
    environment:
      POSTGRES_DB: onlinejudge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onlinejudge-network

  redis:
    image: redis:7-alpine
    container_name: onlinejudge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - onlinejudge-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: onlinejudge-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: onlinejudge
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - onlinejudge-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: onlinejudge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - onlinejudge-network

volumes:
  postgres_data:
  redis_data:

networks:
  onlinejudge-network:
    driver: bridge