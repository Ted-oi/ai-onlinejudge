version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: onlinejudge-postgres
    restart: always
    environment:
      POSTGRES_DB: onlinejudge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onlinejudge-network

  redis:
    image: redis:7-alpine
    container_name: onlinejudge-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onlinejudge-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: onlinejudge-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: onlinejudge
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onlinejudge-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: onlinejudge-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - onlinejudge-network

volumes:
  postgres_data:
  redis_data:

networks:
  onlinejudge-network:
    driver: bridge
