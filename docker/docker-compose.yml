version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: onlinejudge-postgres
    environment:
      POSTGRES_DB: onlinejudge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - onlinejudge-network

  redis:
    image: redis:7-alpine
    container_name: onlinejudge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - onlinejudge-network

  judge-server:
    image: qduoj/judge-server:latest
    container_name: onlinejudge-judge
    ports:
      - "8000:8080"
    volumes:
      - judge_data:/data
    environment:
      - JWT_SECRET=onlinejudge-judge-secret-2024
      - MAX_TIME_LIMIT=10000
      - MAX_MEMORY_LIMIT=1024
    networks:
      - onlinejudge-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: onlinejudge-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: onlinejudge
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-in-production
      JUDGE_SERVER_URL: http://judge-server:8080
      JUDGE_SERVER_TOKEN: onlinejudge-judge-secret-2024
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
      - redis
      - judge-server
    networks:
      - onlinejudge-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: onlinejudge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - onlinejudge-network

volumes:
  postgres_data:
  redis_data:
  judge_data:

networks:
  onlinejudge-network:
    driver: bridge
